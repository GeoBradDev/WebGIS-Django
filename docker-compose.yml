version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: django_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env.local
    expose:
      - "8000"

  db:
    image: docker.io/postgis/postgis:latest
    container_name: postgis_db
    restart: always
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d geoninja" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: docker.io/nginx:alpine
    container_name: nginx_proxy
    restart: always
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
      - media_volume:/app/media

volumes:
  pg_data:
  static_volume:
  media_volume:
